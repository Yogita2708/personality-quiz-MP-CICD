<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✨ Personality Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --pink:    #FFB3C6;
    --yellow:  #FFF176;
    --mint:    #B5EAD7;
    --lavender:#C9B8FF;
    --peach:   #FFCBA4;
    --sky:     #AEE6FF;
    --coral:   #FF8FAB;
    --white:   #FFFDF9;
    --text:    #3D2B56;
    --card:    rgba(255,255,255,0.82);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #FFE8F0 0%, #E8F4FF 40%, #F0FFE8 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }

  /* Floating blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 400px; height: 400px;
    background: var(--pink);
    top: -100px; left: -100px;
    animation: float1 8s ease-in-out infinite;
  }
  body::after {
    width: 350px; height: 350px;
    background: var(--mint);
    bottom: -100px; right: -100px;
    animation: float2 10s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-20px)} }

  .container {
    background: var(--card);
    backdrop-filter: blur(14px);
    border-radius: 32px;
    padding: 40px 36px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 8px 48px rgba(100,60,180,0.13), 0 2px 8px rgba(0,0,0,0.06);
    position: relative;
    z-index: 1;
    border: 2px solid rgba(255,255,255,0.7);
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    color: var(--text);
    text-align: center;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .subtitle {
    text-align: center;
    color: #8B6FA6;
    font-size: 0.95rem;
    margin-bottom: 28px;
  }

  /* Progress bar */
  .progress-wrap {
    background: #F0EAF9;
    border-radius: 99px;
    height: 10px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--coral), var(--lavender));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* Step sections */
  .step { display: none; animation: fadeUp 0.4s ease both; }
  .step.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  label.field-label {
    font-weight: 700;
    color: var(--text);
    font-size: 1rem;
    display: block;
    margin-bottom: 10px;
  }
  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    border: 2.5px solid var(--lavender);
    border-radius: 16px;
    font-size: 1.05rem;
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    background: rgba(255,255,255,0.9);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--coral);
    box-shadow: 0 0 0 4px rgba(255,143,171,0.18);
  }

  /* Question card */
  .question-text {
    font-family: 'Baloo 2', cursive;
    font-size: 1.25rem;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .question-num {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #A58CC8;
    margin-bottom: 8px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option-btn {
    padding: 14px 20px;
    border-radius: 18px;
    border: 2.5px solid transparent;
    background: #F7F0FF;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.98rem;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .option-btn:nth-child(1) { background: #FFF0F5; border-color: #FFD6E0; }
  .option-btn:nth-child(2) { background: #F0FFF7; border-color: #B5EAD7; }
  .option-btn:nth-child(3) { background: #F3F0FF; border-color: #C9B8FF; }
  .option-btn:nth-child(4) { background: #FFFBF0; border-color: #FFE082; }

  .option-btn:hover {
    transform: translateX(6px) scale(1.01);
    box-shadow: 0 4px 18px rgba(100,60,180,0.12);
  }
  .option-btn.selected {
    border-color: var(--coral);
    background: linear-gradient(135deg, #FFE8F0, #F3F0FF);
    box-shadow: 0 4px 18px rgba(255,143,171,0.25);
  }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 15px;
    border-radius: 20px;
    border: none;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    background: linear-gradient(135deg, var(--coral), var(--lavender));
    color: white;
    box-shadow: 0 4px 20px rgba(255,100,150,0.3);
    letter-spacing: 0.5px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,100,150,0.38); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Result */
  #result-section { text-align: center; }
  .result-emoji { font-size: 5rem; margin-bottom: 12px; animation: bounceIn 0.6s both; }
  @keyframes bounceIn {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }
  .result-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.9rem;
    color: var(--text);
    margin-bottom: 8px;
  }
  .result-name {
    font-size: 1.1rem;
    color: #8B6FA6;
    margin-bottom: 16px;
  }
  .result-desc {
    background: linear-gradient(135deg, #FFF0F5, #F3F0FF);
    border-radius: 20px;
    padding: 20px 22px;
    color: var(--text);
    line-height: 1.7;
    font-size: 0.98rem;
    border: 2px solid #F0E0FF;
    margin-bottom: 16px;
  }
  .traits {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 24px;
  }
  .trait-tag {
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 0.82rem;
    font-weight: 700;
  }

  /* Firecracker canvas */
  #fireworks-canvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<canvas id="fireworks-canvas"></canvas>

<div class="container">
  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progress" style="width:0%"></div>
  </div>

  <!-- Step 0: Name -->
  <div class="step active" id="step-name">
    <h1>✨ Who Are You?</h1>
    <p class="subtitle">A fun little personality journey awaits~</p>
    <label class="field-label" for="name-input">What's your name? 🌸</label>
    <input type="text" id="name-input" placeholder="Type your name here…" maxlength="30" autocomplete="off"/>
    <button class="btn" id="start-btn" onclick="startQuiz()" disabled>Let's Begin! →</button>
  </div>

  <!-- Questions inserted here -->
  <div id="questions-container"></div>

  <!-- Result -->
  <div class="step" id="result-section">
    <div class="result-emoji" id="res-emoji"></div>
    <div class="result-title" id="res-title"></div>
    <div class="result-name" id="res-name"></div>
    <div class="result-desc" id="res-desc"></div>
    <div class="traits" id="res-traits"></div>
    <button class="btn" onclick="restartQuiz()">🔄 Try Again!</button>
  </div>
</div>

<script>
const QUESTIONS = [
  // Block A – Social
  {
    q: "It's Friday night. What sounds most like you?",
    opts: [
      { text: "🎉 Throwing or attending a huge party", type: "E" },
      { text: "☕ Cozy night in with one close friend", type: "I" },
      { text: "📚 Getting lost in a good book or series", type: "I" },
      { text: "🌆 Spontaneous adventure around the city", type: "E" }
    ]
  },
  {
    q: "When meeting someone new, you tend to…",
    opts: [
      { text: "🗣️ Talk a lot and share stories right away", type: "E" },
      { text: "👂 Listen more than you speak", type: "I" },
      { text: "🤔 Ask deep questions to really know them", type: "I" },
      { text: "😄 Make jokes to break the ice", type: "E" }
    ]
  },
  {
    q: "Your energy level is usually…",
    opts: [
      { text: "⚡ Always high — I love being on the go!", type: "E" },
      { text: "🌙 Steady — I need quiet time to recharge", type: "I" },
      { text: "🎢 Up and down depending on the day", type: "I" },
      { text: "☀️ High in social settings, low alone", type: "E" }
    ]
  },
  {
    q: "Friends describe your vibe as…",
    opts: [
      { text: "🦋 The life of the party", type: "E" },
      { text: "🍃 The calm, thoughtful one", type: "I" },
      { text: "🔮 The deep, mysterious one", type: "I" },
      { text: "🌟 The energetic cheerleader", type: "E" }
    ]
  },
  // Block B – Thinking style
  {
    q: "When faced with a big decision, you…",
    opts: [
      { text: "📊 Make a pros-and-cons list instantly", type: "T" },
      { text: "💖 Go with whatever feels right in your heart", type: "F" },
      { text: "🧩 Analyse every possible outcome first", type: "T" },
      { text: "🤝 Ask people you trust for their feelings", type: "F" }
    ]
  },
  {
    q: "You'd rather spend a weekend…",
    opts: [
      { text: "🔭 Learning something new and complex", type: "T" },
      { text: "🎨 Making art, music, or something creative", type: "F" },
      { text: "🧮 Solving puzzles or strategy games", type: "T" },
      { text: "🌻 Volunteering or helping someone out", type: "F" }
    ]
  },
  {
    q: "What matters most to you in a job?",
    opts: [
      { text: "💡 Intellectual challenge and growth", type: "T" },
      { text: "❤️ Making a real difference for people", type: "F" },
      { text: "🏆 Results, efficiency, and achievement", type: "T" },
      { text: "🌈 Creativity and self-expression", type: "F" }
    ]
  },
  {
    q: "In arguments you tend to be…",
    opts: [
      { text: "⚖️ Logical — facts win debates", type: "T" },
      { text: "🫂 Empathetic — feelings matter most", type: "F" },
      { text: "📌 Direct and concise about your points", type: "T" },
      { text: "🕊️ A peacemaker who avoids conflict", type: "F" }
    ]
  }
];

const TYPES = {
  EF: {
    emoji: "🌟",
    title: "The Radiant Connector",
    desc: "You light up every room you walk into! Warm, expressive, and deeply empathetic, you thrive on meaningful human connections. You're the friend everyone calls when they need both a party and a shoulder to cry on.",
    traits: ["🌸 Warm-hearted","🎉 Social butterfly","💬 Great communicator","🤗 Emotionally intelligent"],
    colors: ["#FFB3C6","#FFCBA4","#FFF176"]
  },
  ET: {
    emoji: "🚀",
    title: "The Visionary Leader",
    desc: "Bold, driven, and magnetic — you know exactly where you're going and you bring others along for the ride. You combine social energy with sharp analytical thinking, making you a natural leader and innovator.",
    traits: ["⚡ High energy","📊 Strategic","🎯 Goal-oriented","🌟 Inspiring"],
    colors: ["#AEE6FF","#C9B8FF","#B5EAD7"]
  },
  IF: {
    emoji: "🌙",
    title: "The Gentle Dreamer",
    desc: "Deeply introspective and compassionate, you feel everything at a profound level. You value authentic one-on-one connections over crowds, and your rich inner world fuels incredible creativity and empathy.",
    traits: ["🍃 Thoughtful","💖 Compassionate","🎨 Creative","🔮 Introspective"],
    colors: ["#C9B8FF","#FFB3C6","#B5EAD7"]
  },
  IT: {
    emoji: "🧠",
    title: "The Quiet Mastermind",
    desc: "Sharp, independent, and endlessly curious — you're the person who quietly figures everything out before anyone else even understands the problem. You love depth over breadth and meaningful over loud.",
    traits: ["🔭 Analytical","📚 Deep thinker","🧩 Problem solver","🌿 Independent"],
    colors: ["#AEE6FF","#B5EAD7","#FFF176"]
  }
};

let currentStep = 0;   // 0 = name, 1–8 = questions, 9 = result
let answers = [];
let userName = '';

// Enable start button when name typed
document.getElementById('name-input').addEventListener('input', function() {
  document.getElementById('start-btn').disabled = this.value.trim().length < 2;
});
document.getElementById('name-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && this.value.trim().length >= 2) startQuiz();
});

function buildQuestions() {
  const container = document.getElementById('questions-container');
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.id = `step-q${i}`;
    div.innerHTML = `
      <h1>🌸 Quiz Time!</h1>
      <p class="subtitle">Question ${i+1} of ${QUESTIONS.length}</p>
      <div class="question-num">Question ${i+1} / ${QUESTIONS.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="opts-${i}">
        ${q.opts.map((o,j) => `
          <button class="option-btn" onclick="selectOption(${i},${j},'${o.type}')" id="opt-${i}-${j}">
            ${o.text}
          </button>`).join('')}
      </div>
      <button class="btn" id="next-btn-${i}" onclick="nextQuestion(${i})" disabled>
        ${i < QUESTIONS.length-1 ? 'Next Question →' : 'See My Result! 🎉'}
      </button>`;
    container.appendChild(div);
  });
}

function selectOption(qi, oi, type) {
  // Deselect all
  document.querySelectorAll(`#opts-${qi} .option-btn`).forEach(b => b.classList.remove('selected'));
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  answers[qi] = type;
  document.getElementById(`next-btn-${qi}`).disabled = false;
}

function showStep(stepId) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(stepId).classList.add('active');
}

function updateProgress(step) {
  // step 0 = name, 1-8 = questions, 9 = result
  const pct = Math.round((step / (QUESTIONS.length + 1)) * 100);
  document.getElementById('progress').style.width = pct + '%';
}

function startQuiz() {
  userName = document.getElementById('name-input').value.trim();
  if (userName.length < 2) return;
  buildQuestions();
  currentStep = 1;
  showStep('step-q0');
  updateProgress(1);
}

function nextQuestion(qi) {
  const next = qi + 1;
  if (next < QUESTIONS.length) {
    showStep(`step-q${next}`);
    updateProgress(next + 1);
  } else {
    showResult();
  }
}

function showResult() {
  // Count E/I and T/F
  let E=0,I=0,T=0,F=0;
  answers.forEach(a => {
    if(a==='E') E++;
    else if(a==='I') I++;
    else if(a==='T') T++;
    else if(a==='F') F++;
  });
  const social = E >= I ? 'E' : 'I';
  const thinking = T >= F ? 'T' : 'F';
  const key = social + thinking;
  const r = TYPES[key];

  document.getElementById('res-emoji').textContent = r.emoji;
  document.getElementById('res-title').textContent = r.title;
  document.getElementById('res-name').textContent = `Hey ${userName}, this is you! ✨`;
  document.getElementById('res-desc').textContent = r.desc;

  const traitsDiv = document.getElementById('res-traits');
  traitsDiv.innerHTML = '';
  const tagColors = r.colors;
  r.traits.forEach((t,i) => {
    const span = document.createElement('span');
    span.className = 'trait-tag';
    span.textContent = t;
    span.style.background = tagColors[i % tagColors.length];
    span.style.color = '#3D2B56';
    traitsDiv.appendChild(span);
  });

  showStep('result-section');
  updateProgress(QUESTIONS.length + 1);
  launchFireworks();
}

function restartQuiz() {
  answers = [];
  currentStep = 0;
  userName = '';
  document.getElementById('name-input').value = '';
  document.getElementById('start-btn').disabled = true;
  document.getElementById('questions-container').innerHTML = '';
  showStep('step-name');
  updateProgress(0);
}

// ── Fireworks ──────────────────────────────────────────
const canvas = document.getElementById('fireworks-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animId = null;

function launchFireworks() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = [];
  let bursts = 0;
  const colors = ['#FFB3C6','#FFF176','#B5EAD7','#C9B8FF','#FFCBA4','#AEE6FF','#FF8FAB','#A8EDCD'];

  function burst() {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height * 0.6 + 50;
    for (let i = 0; i < 60; i++) {
      const angle = (Math.PI * 2 / 60) * i + Math.random() * 0.2;
      const speed = 2 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.012 + Math.random() * 0.012,
        color: colors[Math.floor(Math.random() * colors.length)],
        r: 3 + Math.random() * 3
      });
    }
    bursts++;
    if (bursts < 14) setTimeout(burst, 220);
  }

  burst();
  if (animId) cancelAnimationFrame(animId);
  animate();
  setTimeout(() => { cancelAnimationFrame(animId); ctx.clearRect(0,0,canvas.width,canvas.height); }, 5000);
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.09; // gravity
    p.life -= p.decay;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  if (particles.length > 0) animId = requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
